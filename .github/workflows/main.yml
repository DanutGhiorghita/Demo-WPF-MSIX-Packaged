name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore "Demo WPF MSIX Packaged/Demo WPF MSIX Packaged/Demo WPF MSIX Packaged.csproj"

      - name: Build
        run: dotnet build "Demo WPF MSIX Packaged/Demo WPF MSIX Packaged/Demo WPF MSIX Packaged.csproj" --configuration Release --no-restore
