# =============================================================================
# CI/CD Pipeline: Build WPF Application, Create MSI Installer & Updater Config
# =============================================================================
# This workflow builds a .NET 8 WPF application, packages it into a signed MSI
# installer using Advanced Installer, and generates an Updater configuration
# file (updates.ini) for the Advanced Installer auto-update mechanism.
#
# Required GitHub Secrets:
#   - SIGNING_CERTIFICATE   : Base64-encoded PFX certificate for code signing
#   - CERTIFICATE_PASS      : Password for the PFX certificate
#   - ADVINST_LICENSE_KEY   : Advanced Installer license key
# =============================================================================

name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet dependencies
        run: dotnet restore --verbosity minimal
        working-directory: "${{ github.workspace }}\\Demo WPF MSIX Packaged"
        shell: pwsh

      - name: Build application (Release)
        run: dotnet build --configuration Release --no-restore --verbosity minimal
        working-directory: "${{ github.workspace }}\\Demo WPF MSIX Packaged"
        shell: pwsh

      # -----------------------------------------------------------------------
      # Code Signing
      # -----------------------------------------------------------------------
      # The PFX certificate is stored as a Base64-encoded GitHub secret.
      # We decode it to a temporary file on disk so Advanced Installer can use
      # it during the MSI build. The file is cleaned up immediately after.
      # -----------------------------------------------------------------------
      - name: Decode signing certificate from secrets
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.SIGNING_CERTIFICATE }}")
          [IO.File]::WriteAllBytes("${{ github.workspace }}\cert.pfx", $certBytes)
        shell: pwsh

      # -----------------------------------------------------------------------
      # MSI Installer Build (Advanced Installer)
      # -----------------------------------------------------------------------
      # Uses the Advanced Installer GitHub Action to:
      #   1. Set the product version to 1.0.<run_number>
      #   2. Sync the application binaries into the installer's APPDIR
      #   3. Enable digital signing and configure the PFX certificate
      # -----------------------------------------------------------------------
      - name: Build MSI installer (Advanced Installer)
        uses: caphyon/advinst-github-action@main
        with:
          advinst-license: ${{ secrets.ADVINST_LICENSE_KEY }}
          advinst-enable-automation: 'true'
          aip-path: "${{ github.workspace }}\\File Browser Sample App.aip"
          aip-build-name: DefaultBuild
          aip-output-dir: "${{ github.workspace }}\\installer-output"
          aip-commands: |
            SetVersion 1.0.${{ github.run_number }}
            NewSync APPDIR "${{ github.workspace }}\\Demo WPF MSIX Packaged\\bin\\Release\\net8.0-windows\\win-x64\\" -existingfiles delete
            SetSig 
            SetDigitalCertificateFile -file "${{ github.workspace }}\cert.pfx" -password "${{ secrets.CERTIFICATE_PASS }}"

      # Remove the PFX from disk as soon as possible. Runs even if the build
      # step fails, as a defensive measure for self-hosted runners.
      - name: Clean up signing certificate
        if: always()
        run: Remove-Item -Path "${{ github.workspace }}\cert.pfx" -Force -ErrorAction SilentlyContinue
        shell: pwsh

      # -----------------------------------------------------------------------
      # Resolve MSI Filename (useful when the MSI gets named dinamically e.g contains versioning in its name)
      # -----------------------------------------------------------------------
      # Discovers the built MSI in the output folder and exports its name,
      # full path, and a URL-encoded version of the name (spaces -> %20) so
      # the Updater configuration step can build a valid download URL.
      # -----------------------------------------------------------------------
      - name: Resolve MSI filename and path
        id: msi
        run: |
          $msiPath = Get-ChildItem -Path "${{ github.workspace }}\installer-output" -Filter "*.msi" | Select-Object -First 1
          if (-not $msiPath) { Write-Error "No MSI found in installer-output"; exit 1 }
          $encoded = [Uri]::EscapeDataString($msiPath.Name)
          echo "MSI_NAME=$($msiPath.Name)" >> $env:GITHUB_OUTPUT
          echo "MSI_PATH=$($msiPath.FullName)" >> $env:GITHUB_OUTPUT
          echo "MSI_NAME_ENCODED=$encoded" >> $env:GITHUB_OUTPUT
          Write-Host "::notice::MSI found: $($msiPath.FullName)"
        shell: pwsh

      # -----------------------------------------------------------------------
      # Updater Configuration (Advanced Installer) using CLI
      # -----------------------------------------------------------------------
      # Generates an updates.ini file that the Advanced Installer Updater
      # component reads at runtime to check for new versions. The URL points
      # to your deployment server where the MSI will be hosted.
      # -----------------------------------------------------------------------
      - name: Build Updater configuration using CLI (Advanced Installer)
        uses: caphyon/advinst-github-action@main
        with:
          advinst-license: ${{ secrets.ADVINST_LICENSE_KEY }}
          advinst-enable-automation: 'true'
          aip-path: "${{ github.workspace }}\\FileBrowser Update.aip"
          aip-commands: |
            DeleteUpdate Update
            NewUpdate "${{ steps.msi.outputs.MSI_PATH }}" -name "Update" -display_name "${{ steps.msi.outputs.MSI_NAME }}" -url "https://deploy.your-website.com/installers/${{ steps.msi.outputs.MSI_NAME_ENCODED }}"
            UpdateInstaller Update -path "${{ steps.msi.outputs.MSI_PATH }}" -command_line "/qb" -no_cache
            SetUpdateDescription Update -type Description -description "A new version is available with new features, enhanced UX and performance improvements." -overwrite
            SetUpdateDescription Update -type Feature -description "New features are available in this version." -overwrite
            SetUpdateDescription Update -type Enhancement -description "Enhanced UX and performance improvements." -overwrite
            SetUpdateDescription Update -type BugFix -description "All known bugs have been fixed." -overwrite


      # -----------------------------------------------------------------------
      # Updater Configuration (Advanced Installer) using PowerShell COM
      # -----------------------------------------------------------------------
      # Generates an updates.ini file that the Advanced Installer Updater
      # component reads at runtime to check for new versions. The URL points
      # to your deployment server where the MSI will be hosted.
      # -----------------------------------------------------------------------
      - name: Build Updater configuration using PowerShell COM (Advanced Installer)             
        shell: pwsh
        run: |
          # --------------------------------------------------------------------------------------------------
          # Create a new Advanced Installer Updates Configuration project
          # --------------------------------------------------------------------------------------------------
          
          $msiPackagePath = "${{ steps.msi.outputs.MSI_PATH }}"
          $outputProjectPath = "${{ github.workspace }}\\FileBrowser Update COM-SetupFiles"
          $applicationExecutable = "[APPDIR]Demo WPF MSIX Packaged.exe"
          
          $updateName = "Update"
          $updateDownloadUrl = "https://deploy.your-website.com/installers/${{ steps.msi.outputs.MSI_NAME_ENCODED }}"
          $installerCommandLine = "/qb"
          
          # Validate input MSI
          if (-not (Test-Path $msiPackagePath)) {
              throw "The MSI package was not found: $msiPackagePath"
          }
          
          # Create Advanced Installer COM object
          $advancedInstaller = New-Object -ComObject "AdvancedInstaller"
          
          # Create a new Updates Configuration project
          $updateProject = $advancedInstaller.CreateProject($advancedInstaller.ProjectTypes.Update)
          
          # Create update entry
          $updateEntry = $updateProject.NewUpdate($updateName, $msiPackagePath)
          
          # Configure properties (corresponds to Properties tab in the Updates Config Project UI)
          $updateEntry.Properties.MainUrl = $updateDownloadUrl
          $updateEntry.Installer.CommandLine = $installerCommandLine
          $updateEntry.Installer.DeleteUpdatePackageAfterInstall = $true
          
          # Configure release notes (corresponds to Release Notes tab in the Updates Config Project UI)
          $updateEntry.ReleaseNotes.Features = "New features are available in this version."
          $updateEntry.ReleaseNotes.Enhancements = "UX and performance improvements are included in this version."
          $updateEntry.ReleaseNotes.BugsFixed = "All known bugs have been fixed in this update."
          
          # Configure application restart behavior (corresponds to Auto Close Application tab in the Updates Config Project UI)
          $autoCloseApplication = $updateEntry.NewAutoCloseApplication($applicationExecutable)
          $autoCloseApplication.RestartAlways = $true
          
          # Set the output file name for the generated .ini file (corresponds to the File name field in the Build tab of the Updates Config Project UI)
          $updateProject.OutputFileName = "FileBrowserUpdateCOM.ini"
          
          # Save and build the Updates Configuration project
          $updateProject.SaveAs($outputProjectPath)
          $updateProject.Build()
            

      # -----------------------------------------------------------------------
      # Upload Artifacts
      # -----------------------------------------------------------------------
      # Three artifacts are uploaded for each build:
      #   1. Application binaries — the raw build output
      #   2. MSI installer       — the signed installer package
      #   3. Updater config CLI   — the updates.ini for the auto-update server
      #   4. Updater config COM   — the updates.ini for the auto-update server through PowerShell Automation
      # All artifacts are retained for 5 days.
      # -----------------------------------------------------------------------
      - name: Upload build artifacts (application binaries)
        uses: actions/upload-artifact@v4
        with:
          name: FileBrowser-Release-${{ github.run_number }}
          path: "${{ github.workspace }}\\Demo WPF MSIX Packaged\\bin\\Release\\net8.0-windows\\win-x64\\"
          if-no-files-found: error
          retention-days: 5

      - name: Upload installer artifact (MSI)
        uses: actions/upload-artifact@v4
        with:
          name: FileBrowser-Installer-${{ github.run_number }}
          path: "${{ github.workspace }}\\installer-output\\"
          if-no-files-found: error
          retention-days: 5

      - name: Upload Updater configuration artifact CLI (updates.ini)
        uses: actions/upload-artifact@v4
        with:
          name: FileBrowser-Updates-${{ github.run_number }}
          path: "${{ github.workspace }}\\FileBrowser Update-SetupFiles\\"
          if-no-files-found: error
          retention-days: 5

      - name: Upload Updater configuration artifact COM (updates.ini)
        uses: actions/upload-artifact@v4
        with:
          name: FileBrowser-Updates-COM-${{ github.run_number }}
          path: "${{ github.workspace }}\\FileBrowser Update COM-SetupFiles\\"
          if-no-files-found: error
          retention-days: 5
