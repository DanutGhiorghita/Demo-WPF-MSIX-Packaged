name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore --verbosity minimal
        working-directory: "${{ github.workspace }}\\Demo WPF MSIX Packaged"
        shell: pwsh

      - name: Build
        run: dotnet build --configuration Release --no-restore --verbosity minimal
        working-directory: "${{ github.workspace }}\\Demo WPF MSIX Packaged"
        shell: pwsh

      - name: Decode signing certificate
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.SIGNING_CERTIFICATE }}")
          [IO.File]::WriteAllBytes("${{ github.workspace }}\cert.pfx", $certBytes)
        shell: pwsh

      - name: Build installer
        uses: caphyon/advinst-github-action@main
        with:
          advinst-license: ${{ secrets.ADVINST_LICENSE_KEY }}
          advinst-enable-automation: 'true'
          aip-path: "${{ github.workspace }}\\File Browser Sample App.aip"
          aip-build-name: DefaultBuild
          aip-output-dir: "${{ github.workspace }}\\installer-output"
          aip-commands: |
            SetVersion 1.0.${{ github.run_number }}
            NewSync APPDIR "${{ github.workspace }}\\Demo WPF MSIX Packaged\\bin\\Release\\net8.0-windows\\win-x64\\" -existingfiles delete
            SetSig 
            SetDigitalCertificateFile -file "${{ github.workspace }}\cert.pfx" -password "${{ secrets.CERTIFICATE_PASS }}"

      - name: Clean up signing certificate
        if: always()
        run: Remove-Item -Path "${{ github.workspace }}\cert.pfx" -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Resolve MSI name
        id: msi
        run: |
          $msiPath = Get-ChildItem -Path "${{ github.workspace }}\installer-output" -Filter "*.msi" | Select-Object -First 1
          if (-not $msiPath) { Write-Error "No MSI found in installer-output"; exit 1 }
          $encoded = [Uri]::EscapeDataString($msiPath.Name)
          echo "MSI_NAME=$($msiPath.Name)" >> $env:GITHUB_OUTPUT
          echo "MSI_PATH=$($msiPath.FullName)" >> $env:GITHUB_OUTPUT
          echo "MSI_NAME_ENCODED=$encoded" >> $env:GITHUB_OUTPUT
          Write-Host "::notice::MSI found: $($msiPath.FullName)"
        shell: pwsh

      - name: Build updates config
        uses: caphyon/advinst-github-action@main
        with:
          advinst-license: ${{ secrets.ADVINST_LICENSE_KEY }}
          advinst-enable-automation: 'true'
          aip-path: "${{ github.workspace }}\\FileBrowser Update.aip"
          aip-commands: |
            DeleteUpdate Update
            NewUpdate "${{ steps.msi.outputs.MSI_PATH }}" -name "Update" -display_name "${{ steps.msi.outputs.MSI_NAME }}" -url "https://deploy.your-website.com/installers/${{ steps.msi.outputs.MSI_NAME_ENCODED }}"
            UpdateInstaller Update -path "${{ steps.msi.outputs.MSI_PATH }}" -command_line "/qb" -no_cache
            SetUpdateDescription Update -type Description -description "A new version is available with new features, enhanced UX and performance improvements." -overwrite
            SetUpdateDescription Update -type Feature -description "New features are available in this version." -overwrite
            SetUpdateDescription Update -type Enhancement -description "Enhanced UX and performance improvements." -overwrite
            SetUpdateDescription Update -type BugFix -description "All known bugs have been fixed." -overwrite

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FileBrowser-Release-${{ github.run_number }}
          path: "${{ github.workspace }}\\Demo WPF MSIX Packaged\\bin\\Release\\net8.0-windows\\win-x64\\"
          if-no-files-found: error
          retention-days: 30

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileBrowser-Installer-${{ github.run_number }}
          path: "${{ github.workspace }}\\installer-output\\"
          if-no-files-found: error
          retention-days: 30

      - name: Upload updates config artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileBrowser-Updates-${{ github.run_number }}
          path: "${{ github.workspace }}\\FileBrowser Update-SetupFiles\\"
          if-no-files-found: error
          retention-days: 30
